<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCWIS Care360</title>
  <style>
    :root {
      --ink: #1b2a41;
      --muted: #68798d;
      --line: #deebf6;
      --soft-blue: #eaf5ff;
      --blue: #3f6fe5;
      --sky: #58a9e8;
      --green: #3a9f6a;
      --mint: #eaf8f0;
      --purple: #7b61df;
      --lavender: #f3efff;
      --amber: #d78b22;
      --cream: #fff8e8;
      --rose: #d94f5f;
      --rose-soft: #fff0f2;
      --teal: #238c8f;
      --panel: #ffffff;
      --shadow: 0 16px 34px rgba(28, 57, 95, 0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
      color: var(--ink);
      background: #fff;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    body.locked .app-shell { display: none; }
    body.locked .login-screen { display: grid; }

    .login-screen {
      min-height: 100vh;
      display: none;
      grid-template-columns: minmax(420px, 0.95fr) minmax(420px, 1.05fr);
      background:
        radial-gradient(circle at 8% 12%, rgba(88,169,232,0.24), transparent 28%),
        radial-gradient(circle at 92% 80%, rgba(58,159,106,0.23), transparent 30%),
        linear-gradient(135deg, #16355b 0%, #1e5f82 54%, #eff8ff 54.2%, #ffffff 100%);
      padding: 42px;
      gap: 34px;
      align-items: center;
    }
    .login-card, .login-demo {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 22px;
      box-shadow: 0 28px 70px rgba(12, 39, 70, 0.22);
    }
    .login-card { padding: 34px; max-width: 500px; justify-self: end; width: 100%; }
    .login-demo { padding: 24px; width: 100%; max-width: 630px; }
    .brand-row { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
    .login-logo-hero {
      width: 100%; height: 172px; object-fit: contain; object-position: center;
      border-radius: 18px; border: 1px solid rgba(211,230,247,0.95);
      box-shadow: 0 18px 34px rgba(12, 39, 70, 0.16);
      margin-bottom: 22px; padding: 10px 14px;
      background: linear-gradient(135deg, #eef8ff 0%, #f8fcff 100%);
    }
    .brand-mark {
      width: 58px; height: 58px; border-radius: 18px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: white; display: grid; place-items: center; font-weight: 900; font-size: 20px;
      box-shadow: 0 14px 26px rgba(63,111,229,0.25);
    }
    .brand-logo-mark {
      width: 58px; height: 58px; border-radius: 18px; object-fit: cover; object-position: center;
      border: 1px solid rgba(255,255,255,0.9); background: #102033;
      box-shadow: 0 14px 26px rgba(63,111,229,0.25);
    }
    h1, h2, h3, h4, p { margin: 0; }
    h1 { font-size: 34px; line-height: 1.08; }
    .muted { color: var(--muted); }
    .badge-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0 24px; }
    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      border-radius: 999px; padding: 7px 11px;
      background: #f5f9ff; border: 1px solid #d9e8f8;
      color: #244563; font-weight: 800; font-size: 12px;
    }
    .badge::before { content: ""; width: 7px; height: 7px; border-radius: 99px; background: var(--green); }
    .field { display: grid; gap: 7px; margin: 13px 0; }
    .field label { color: #3d526b; font-weight: 800; font-size: 13px; }
    .field input, .field select, .soft-select {
      border: 1px solid #ccdaea; background: white; color: var(--ink);
      border-radius: 10px; padding: 12px 13px; outline: none;
    }
    .field input:focus, .field select:focus, .soft-select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(63,111,229,0.12); }
    .primary-btn, .soft-btn, .ghost-btn, .danger-btn {
      border: 0; border-radius: 10px; padding: 11px 14px; font-weight: 850;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .primary-btn { background: var(--blue); color: white; box-shadow: 0 12px 22px rgba(63,111,229,0.22); }
    .soft-btn { background: #edf4ff; color: var(--blue); }
    .ghost-btn { background: white; color: #31506f; border: 1px solid #d7e5f4; }
    .ghost-btn.active { border-color: var(--blue); background: #eef4ff; color: var(--blue); }
    .danger-btn { background: var(--rose-soft); color: #b92c44; }
    .login-actions { display: grid; gap: 10px; margin-top: 18px; }
    .login-error { display: none; color: #b92c44; font-weight: 800; font-size: 13px; }
    .login-error.show { display: block; }
    .demo-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 13px; margin-top: 18px; }
    .demo-account {
      text-align: left; border: 1px solid #d7e5f4; background: #fff; border-radius: 14px;
      padding: 15px; display: grid; gap: 8px; transition: transform .18s ease, box-shadow .18s ease;
    }
    .demo-account:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .demo-account strong { font-size: 15px; }
    .demo-account small { color: var(--muted); line-height: 1.5; }
    .language-row { display: flex; justify-content: space-between; align-items: center; gap: 14px; margin-bottom: 18px; }

    .app-shell { min-height: 100vh; display: grid; grid-template-columns: 270px minmax(0, 1fr); background: white; }
    .sidebar {
      background: linear-gradient(180deg, #dff0ff 0%, #edf7ff 55%, #f6fbff 100%);
      border-right: 1px solid #d5e8f8;
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .side-brand { display: flex; gap: 12px; align-items: center; }
    .side-brand .brand-mark { width: 44px; height: 44px; border-radius: 14px; font-size: 15px; }
    .side-brand .brand-logo-mark { width: 52px; height: 52px; border-radius: 15px; }
    .side-logo-strip {
      width: 100%; height: 118px; object-fit: contain; object-position: center;
      padding: 8px 10px;
      border-radius: 16px; border: 1px solid #d3e6f7;
      background: linear-gradient(135deg, #eaf5ff 0%, #f7fbff 100%);
      box-shadow: 0 14px 28px rgba(28, 57, 95, 0.09);
    }
    .user-card {
      background: rgba(255,255,255,0.72);
      border: 1px solid #d3e6f7;
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 9px;
    }
    .avatar {
      width: 38px; height: 38px; border-radius: 13px; background: #fff;
      display: grid; place-items: center; color: var(--blue); font-weight: 900;
      border: 1px solid #c7def4;
    }
    .nav-list { display: grid; gap: 9px; }
    .nav-btn {
      border: 1px solid transparent; background: transparent; color: #31506f;
      border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px;
      text-align: left; font-weight: 850;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.56); }
    .nav-btn.active { background: #fff; color: var(--blue); border-color: #cddff7; box-shadow: 0 10px 20px rgba(63,111,229,0.08); }
    .nav-icon {
      width: 30px; height: 30px; border-radius: 10px; display: grid; place-items: center;
      background: #eef5ff; color: var(--blue);
    }
    .sidebar-spacer { flex: 1; }
    .logout { width: 100%; }

    .main {
      background: #fff;
      min-width: 0;
      padding: 26px 34px 50px;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
      padding-bottom: 20px; border-bottom: 1px solid #e7eef6; margin-bottom: 24px;
    }
    .topbar h2 { font-size: 28px; display: flex; align-items: center; gap: 10px; }
    .page-kicker { color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .lang-control { display: flex; align-items: center; gap: 10px; color: #526a83; font-weight: 800; }
    .top-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: flex-end; }
    .top-logo {
      display: flex; align-items: center; gap: 10px;
      border: 1px solid #d7e5f4; background: #f7fbff; border-radius: 14px; padding: 6px 10px;
      color: #31506f; font-weight: 900;
    }
    .top-logo img { width: 178px; height: 58px; object-fit: contain; object-position: center; border-radius: 10px; }

    .screen { display: none; }
    .screen.active { display: block; }
    .section { margin-top: 22px; }
    .section-head {
      display: flex; justify-content: space-between; align-items: flex-end; gap: 16px;
      margin-bottom: 15px;
    }
    .section-title { display: flex; align-items: center; gap: 11px; }
    .title-icon {
      width: 36px; height: 36px; border-radius: 12px; display: grid; place-items: center;
      color: white; font-weight: 900; flex: 0 0 auto;
    }
    .i-blue { background: var(--blue); }
    .i-green { background: var(--green); }
    .i-purple { background: var(--purple); }
    .i-amber { background: var(--amber); }
    .i-rose { background: var(--rose); }
    .i-teal { background: var(--teal); }
    .card {
      background: var(--panel); border: 1px solid #e0eaf4; border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px;
    }
    .card.tint-blue { background: linear-gradient(180deg, #f6fbff, #fff); border-left: 4px solid var(--blue); }
    .card.tint-green { background: linear-gradient(180deg, #f1fbf5, #fff); border-left: 4px solid var(--green); }
    .card.tint-purple { background: linear-gradient(180deg, #f6f2ff, #fff); border-left: 4px solid var(--purple); }
    .card.tint-amber { background: linear-gradient(180deg, #fff9ed, #fff); border-left: 4px solid var(--amber); }
    .grid { display: grid; gap: 18px; }
    .two { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .three { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .four { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .five { grid-template-columns: repeat(5, minmax(0,1fr)); }
    .aside { grid-template-columns: minmax(0,1.55fr) minmax(300px,0.65fr); align-items: start; }
    .metric {
      min-height: 104px; border-radius: 12px; padding: 17px; border: 1px solid #e1ebf5;
      background: #fff; display: grid; align-content: space-between; gap: 6px;
      box-shadow: 0 12px 24px rgba(28,57,95,0.06);
    }
    .metric .label { color: var(--muted); font-size: 12px; font-weight: 850; }
    .metric .value { font-size: 29px; font-weight: 950; color: var(--blue); }
    .metric .hint { color: var(--muted); font-size: 12px; }
    .metric.green .value { color: var(--green); }
    .metric.purple .value { color: var(--purple); }
    .metric.amber .value { color: var(--amber); }
    .metric.rose .value { color: var(--rose); }
    .metric.teal .value { color: var(--teal); }

    .student-layout { grid-template-columns: minmax(0, 1fr) 270px; align-items: start; }
    .privacy-mini { display: grid; gap: 14px; position: sticky; top: 24px; }
    .privacy-mini .card { padding: 16px; box-shadow: 0 10px 20px rgba(28,57,95,0.06); }
    .check-list { list-style: none; padding: 0; margin: 12px 0 0; display: grid; gap: 9px; }
    .check-list li { display: flex; align-items: flex-start; gap: 9px; color: #344b64; line-height: 1.45; }
    .check { color: var(--green); font-weight: 950; }
    .welcome-panel {
      display: grid; grid-template-columns: minmax(0,1fr) 160px minmax(260px,0.9fr);
      gap: 16px; align-items: stretch;
    }
    .status-pill {
      border: 1px solid #dbe7f3; border-radius: 14px; padding: 18px; background: #fff;
      display: grid; align-content: center; gap: 8px;
    }
    .status-pill strong { color: var(--green); font-size: 23px; }
    .why-box {
      background: #f2f6ff; border-left: 4px solid var(--purple);
      border-radius: 12px; padding: 18px; display: grid; gap: 12px;
    }
    .why-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
    .why-pill { background: rgba(255,255,255,0.76); border-radius: 10px; padding: 12px; color: #415872; line-height: 1.45; }
    .color-note { border-left: 4px solid var(--blue); background: #f6fbff; }
    .color-note.green { border-left-color: var(--green); background: #f3fbf6; }
    .color-note.purple { border-left-color: var(--purple); background: #f7f3ff; }
    .color-note.amber { border-left-color: var(--amber); background: #fff9ed; }
    .checkin-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 16px; }
    .checkin-card { background: #f8fbff; border: 1px solid #e2ebf5; border-radius: 14px; padding: 17px; min-height: 150px; }
    .mood-grid { display: grid; grid-template-columns: repeat(3, 68px); gap: 10px; margin-top: 12px; }
    .mood-btn {
      height: 60px; border-radius: 14px; border: 2px solid #d9e6f4; background: white; font-size: 28px;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    }
    .mood-btn.active { border-color: var(--blue); background: #eef4ff; box-shadow: 0 0 0 3px rgba(63,111,229,0.12); }
    .range-row { display: grid; gap: 12px; margin-top: 17px; }
    input[type="range"] { width: 100%; accent-color: var(--blue); }
    .range-labels { display: flex; justify-content: space-between; color: #8a9bb0; font-size: 12px; font-weight: 800; }
    .value-pill { color: #4b5f78; font-weight: 900; }
    .history-chart { width: 100%; height: 230px; }
    .history-list { display: grid; gap: 12px; margin-top: 12px; }
    .history-item {
      display: flex; justify-content: space-between; gap: 18px; align-items: flex-start;
      border-left: 3px solid var(--blue); padding: 10px 0 10px 14px;
    }
    .history-item p { color: #5d7189; margin-top: 7px; line-height: 1.6; }
    .history-score { color: var(--green); font-weight: 950; }
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center; gap: 16px;
      padding: 14px 0; border-bottom: 1px solid #edf2f7;
    }
    .toggle-row:last-child { border-bottom: 0; }
    .toggle-row strong { display: block; margin-bottom: 4px; }
    .toggle-row span span { color: var(--muted); font-size: 13px; line-height: 1.4; }
    .switch { position: relative; display: inline-block; width: 46px; height: 26px; flex: 0 0 auto; }
    .switch input { display: none; }
    .slider { position: absolute; inset: 0; background: #c9d5e3; border-radius: 999px; transition: .2s; }
    .slider::before { content: ""; position: absolute; width: 20px; height: 20px; left: 3px; top: 3px; border-radius: 50%; background: white; transition: .2s; box-shadow: 0 2px 7px rgba(0,0,0,0.2); }
    .switch input:checked + .slider { background: var(--blue); }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .consent-log { list-style: none; margin: 12px 0 0; padding: 0; display: grid; gap: 9px; color: #4c627a; }
    .consent-log li { display: flex; gap: 8px; align-items: center; }
    .dot { width: 8px; height: 8px; border-radius: 99px; background: var(--green); flex: 0 0 auto; }
    .resource-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
    .resource { display: flex; gap: 12px; align-items: center; border-radius: 12px; background: #f7fbff; border: 1px solid #e2ecf6; padding: 14px; }
    .resource-icon { width: 38px; height: 38px; border-radius: 12px; display: grid; place-items: center; color: white; background: var(--blue); }

    .tab-strip { display: flex; gap: 8px; padding: 6px; border-radius: 14px; background: #f4f8fc; border: 1px solid #e1ebf5; margin-bottom: 18px; width: fit-content; }
    .tab-strip button { border: 0; background: transparent; padding: 10px 13px; border-radius: 10px; color: #526a83; font-weight: 900; }
    .tab-strip button.active { background: white; color: var(--blue); box-shadow: 0 8px 16px rgba(63,111,229,0.09); }
    .filter-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 12px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: 13px 10px; border-bottom: 1px solid #ecf1f7; vertical-align: top; }
    th { color: #63768d; font-size: 12px; text-transform: uppercase; letter-spacing: .02em; }
    tr.case-row { cursor: pointer; }
    tr.case-row:hover { background: #f7fbff; }
    tr.case-row.active { background: #eef5ff; }
    .tag {
      display: inline-flex; align-items: center; border-radius: 999px; padding: 5px 9px;
      font-size: 12px; font-weight: 900; background: #edf4ff; color: var(--blue);
    }
    .tag.high { background: var(--rose-soft); color: var(--rose); }
    .tag.medium { background: var(--cream); color: var(--amber); }
    .tag.low { background: var(--mint); color: var(--green); }
    .review-panel { display: grid; gap: 13px; }
    .confidence-bar { height: 9px; border-radius: 999px; background: #e6edf5; overflow: hidden; }
    .confidence-bar span { display: block; height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); }
    .privacy-guarantee {
      background: linear-gradient(90deg, #e8f9f1, #f7fffb);
      border: 1px solid #bdebd4;
      border-left: 5px solid var(--green);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 13px;
      color: #2c6a55;
      line-height: 1.55;
    }
    .journey-track {
      display: grid; grid-template-columns: repeat(7, minmax(140px,1fr)); gap: 14px;
      overflow-x: auto; padding-bottom: 8px;
    }
    .journey-step {
      min-width: 140px; border: 1px solid #dfeaf5; border-radius: 14px; padding: 16px;
      background: #fff; display: grid; gap: 10px;
    }
    .journey-step .bubble {
      width: 46px; height: 46px; border-radius: 50%; display: grid; place-items: center;
      color: white; background: var(--blue); font-weight: 950;
    }
    .journey-step:nth-child(2) .bubble { background: var(--purple); }
    .journey-step:nth-child(3) .bubble { background: var(--rose); }
    .journey-step:nth-child(4) .bubble { background: var(--green); }
    .journey-step:nth-child(5) .bubble { background: var(--teal); }
    .journey-step:nth-child(6) .bubble { background: var(--amber); }
    .journey-step:nth-child(7) .bubble { background: var(--blue); }
    .empty-state { min-height: 210px; display: grid; place-items: center; border: 1px dashed #cfdceb; border-radius: 14px; background: #fafcff; color: var(--muted); text-align: center; padding: 20px; }
    .audit-list { list-style: none; margin: 12px 0 0; padding: 0; display: grid; gap: 12px; color: #4b6178; }
    .audit-list li { padding-left: 14px; border-left: 3px solid #cbdff2; }

    .live-table small { color: var(--muted); }
    .chart-card { min-height: 360px; }
    .trend-chart { width: 100%; height: 270px; }
    .donut-wrap { display: grid; grid-template-columns: 230px minmax(0,1fr); gap: 16px; align-items: center; }
    .donut {
      width: 210px; height: 210px; border-radius: 50%;
      background: conic-gradient(var(--blue) 0 27%, var(--purple) 27% 52%, var(--amber) 52% 68%, var(--green) 68% 86%, var(--teal) 86% 100%);
      position: relative; margin: auto;
    }
    .donut::after { content: ""; position: absolute; inset: 50px; background: white; border-radius: 50%; box-shadow: inset 0 0 0 1px #e3edf7; }
    .legend { display: grid; gap: 10px; }
    .legend-item { display: flex; align-items: center; gap: 9px; color: #526a83; font-weight: 800; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 99px; }
    .ai-flow { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 14px; }
    .flow-card { background: #fff; border: 1px solid #e2ebf6; border-radius: 14px; padding: 16px; display: grid; gap: 9px; text-align: center; }
    .flow-card .bubble { margin: auto; width: 38px; height: 38px; border-radius: 50%; display: grid; place-items: center; background: #edf4ff; color: var(--blue); font-weight: 950; }
    .warning-box {
      border: 1px solid #efcf75; background: linear-gradient(180deg, #fffbea, #fffef8);
      border-radius: 14px; padding: 22px; display: grid; gap: 12px;
    }
    .bullet-list { margin: 0; padding-left: 22px; color: #415872; line-height: 1.65; }
    .bullet-list li::marker { color: var(--amber); }
    .cost-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; margin-top: 12px; }
    .cost-card { background: #f7fbff; border: 1px solid #e4eef8; border-radius: 12px; padding: 15px; }
    .cost-card strong { display: block; font-size: 20px; color: var(--blue); margin-top: 4px; }
    .why-card { min-height: 175px; display: grid; gap: 10px; }
    .why-card .badge { width: fit-content; }

    .toast {
      position: fixed; right: 24px; bottom: 24px; background: #16355b; color: white;
      border-radius: 12px; padding: 12px 15px; font-weight: 850; box-shadow: var(--shadow); z-index: 30;
    }
    .modal-backdrop {
      position: fixed; inset: 0; display: none; place-items: center; padding: 20px;
      background: rgba(20, 42, 69, 0.38); z-index: 40;
    }
    .modal-backdrop.show { display: grid; }
    .modal {
      width: min(540px, 100%); background: white; border: 1px solid #dce8f5;
      border-radius: 16px; padding: 22px; box-shadow: 0 24px 70px rgba(12, 39, 70, 0.28);
    }
    .modal-body { margin-top: 12px; color: #415872; line-height: 1.65; }
    .modal-actions { display: flex; justify-content: flex-end; margin-top: 18px; }
    .schedule-grid { display: grid; gap: 10px; margin-top: 12px; }
    .schedule-row {
      display: grid; grid-template-columns: 110px repeat(2, minmax(0, 1fr)); gap: 10px; align-items: center;
    }
    .schedule-date { color: #526a83; font-weight: 900; }
    .slot {
      border: 1px solid #dce8f5; background: #f7fbff; color: #254765;
      border-radius: 10px; padding: 10px; font-weight: 850; text-align: center;
    }
    button.slot { cursor: pointer; font: inherit; }
    button.slot:disabled { cursor: not-allowed; }
    .slot.full { background: var(--rose-soft); border-color: #f0b7c0; color: var(--rose); }
    .slot.open { background: #eefaf4; border-color: #c7ebd5; color: var(--green); }
    .slot.open:hover, .slot.selected { border-color: var(--green); box-shadow: 0 0 0 3px rgba(58,159,106,0.12); }
    .schedule-note { color: #526a83; font-weight: 850; margin-top: 12px; font-size: 14px; }
    .slot-confirm { display: none; margin-top: 14px; padding: 14px; border-radius: 12px; background: #f4fbf7; border: 1px solid #c9ebd6; }
    .slot-confirm.show { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .suggestion-list { display: grid; gap: 10px; margin-top: 12px; }
    .suggestion-card { width: 100%; background: #f2f7ff; border: 1px solid #d9e8ff; border-radius: 12px; padding: 12px; color: #2f5fcf; text-align: left; font: inherit; cursor: pointer; }
    .suggestion-card:hover, .suggestion-card.active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(63,111,229,0.1); }
    .message-draft { width: 100%; min-height: 112px; resize: vertical; border: 1px solid #dce8f5; border-radius: 12px; padding: 12px; color: var(--ink); margin-top: 12px; font: inherit; line-height: 1.55; }
    .chat-drawer {
      position: fixed; top: 0; right: 0; width: min(430px, 100%); height: 100vh;
      background: #fff; border-left: 1px solid #dce8f5; box-shadow: -20px 0 55px rgba(12, 39, 70, 0.18);
      transform: translateX(105%); transition: transform .22s ease; z-index: 38;
      display: flex; flex-direction: column;
    }
    .chat-drawer.show { transform: translateX(0); }
    .chat-head { padding: 18px; border-bottom: 1px solid #e8f0f8; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .chat-thread { padding: 18px; display: grid; gap: 12px; overflow: auto; flex: 1; background: #f7fbff; align-content: start; align-items: start; grid-auto-rows: max-content; }
    .chat-bubble { width: fit-content; height: auto; max-width: 82%; padding: 12px 14px; border-radius: 14px; line-height: 1.5; box-shadow: 0 8px 18px rgba(28,57,95,0.06); }
    .chat-bubble.student { justify-self: end; background: var(--blue); color: #fff; border-bottom-right-radius: 4px; }
    .chat-bubble.counselor { justify-self: start; background: #fff; border: 1px solid #dce8f5; color: #344b64; border-bottom-left-radius: 4px; }
    .chat-compose { padding: 14px; border-top: 1px solid #e8f0f8; display: flex; gap: 10px; }
    .chat-compose input { flex: 1; border: 1px solid #dce8f5; border-radius: 10px; padding: 11px; }

    @media (max-width: 1180px) {
      .five { grid-template-columns: repeat(3,minmax(0,1fr)); }
      .four { grid-template-columns: repeat(2,minmax(0,1fr)); }
      .three, .two, .aside, .student-layout, .welcome-panel, .donut-wrap { grid-template-columns: 1fr; }
      .privacy-mini { position: static; }
      .ai-flow { grid-template-columns: repeat(2,minmax(0,1fr)); }
    }
    @media (max-width: 860px) {
      .login-screen { grid-template-columns: 1fr; padding: 22px; }
      .login-card { justify-self: stretch; max-width: none; }
      .demo-grid { grid-template-columns: 1fr; }
      .app-shell { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; }
      .main { padding: 22px 18px 42px; }
      .topbar { flex-direction: column; }
      .checkin-grid, .resource-grid, .cost-grid, .ai-flow { grid-template-columns: 1fr; }
      .five, .four, .three, .two { grid-template-columns: 1fr; }
    }

    function bindStudentControls() {
      document.querySelectorAll("[data-mood]").forEach(btn => btn.addEventListener("click", () => { selectedMood = btn.dataset.mood; renderStudent(); }));
      ["stress","sleep","workload","social","activity"].forEach(id => {
        const range = $(id + "Range");
        const value = $(id + "Value");
        if (range && value) range.addEventListener("input", () => value.textContent = range.value + "/10");
      });
      const submit = $("submitCheckin");
      if (submit) submit.addEventListener("click", submitCheckin);
      const download = $("downloadHistory");
      if (download) download.addEventListener("click", downloadHistory);
      const del = $("deleteHistory");
      if (del) del.addEventListener("click", () => {
        studentWellnessHistories[currentKey] = [];
        wellnessHistory = studentWellnessHistories[currentKey];
        showToast(t("toastDeleted"));
        renderStudent();
      });
      document.querySelectorAll("[data-delete-record]").forEach(btn => btn.addEventListener("click", () => { wellnessHistory.splice(Number(btn.dataset.deleteRecord), 1); renderStudent(); }));
      document.querySelectorAll("[data-consent-key]").forEach(input => input.addEventListener("change", () => {
        consentHistory.push({ date: now(), key: input.dataset.consentKey, state: input.checked ? "enabled" : "disabled" });
        $("consentLog").innerHTML = renderConsentLog();
      }));
      const predictive = $("predictiveBtn");
      if (predictive) predictive.addEventListener("click", () => {
        predictiveEnabled = !predictiveEnabled;
        consentHistory.push({ date: now(), key:"predictive", state: predictiveEnabled ? "enabled" : "disabled" });
        renderStudent();
      });
      const save = $("savePrefs");
      if (save) save.addEventListener("click", () => { consentHistory.push({ date: now(), key:"supportPreferences", state:"savedState" }); showToast(t("toastSaved")); renderStudent(); activeTab = "privacy"; });
      document.querySelectorAll("[data-student-action]").forEach(btn => btn.addEventListener("click", () => {
        const index = Number(btn.dataset.studentAction);
        if (index === 0) showChat("student");
        else if (index === 2) showScheduleModal("student");
        else showModal(t("studentActionTitles")[index], t("studentActionBodies")[index], ["i-green","i-amber"][index - 1] || "i-blue");
      }));
    }

    function submitCheckin() {
      const stress = Number($("stressRange").value);
      const sleep = Number($("sleepRange").value);
      const workload = Number($("workloadRange").value);
      const social = Number($("socialRange").value);
      const activity = Number($("activityRange").value);
      const score = Math.round((sleep + social + activity + (10 - stress) + (10 - Math.max(0, workload - 5))) / 5 * 10);
      wellnessHistory.push({ date: now(), score, mood: selectedMood, stress, sleep, social, activity, workload });
      showToast(t("toastSubmitted"));
      renderStudent();
    }

    function downloadHistory() {
      const rows = [t("exportHeaders"), ...wellnessHistory.map(r => [r.date, r.score, r.mood, r.stress, r.sleep, r.social, r.activity, r.workload])];
      const html = `<html><meta charset="utf-8"><table>${rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("")}</table></html>`;
      const blob = new Blob([html], { type:"application/vnd.ms-excel;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "SCWIS-wellness-history.xls";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast(t("toastDownloaded"));
    }

    function riskTable(filterValue) {
      let rows = cases.map((c, idx) => ({...c, idx})).filter(c => !hiddenCaseIds.has(c.id));
      if (filterValue === "1") rows = rows.filter(r => r.category === 0);
      if (filterValue === "2") rows = rows.filter(r => r.category === 1);
      if (filterValue === "3") rows = rows.filter(r => r.category === 2);
      if (filterValue === "4") rows = rows.filter(r => r.status === 0);

      if (hiddenCaseIds.has(cases[selectedCase]?.id)) selectedCase = rows[0].idx;
      return `<div style="overflow:auto;"><table><thead><tr><th>${t("caseId")}</th><th>${t("riskCategory")}</th><th>${t("aiConfidence")}</th><th>${t("status")}</th><th>${t("identity")}</th></tr></thead><tbody>${rows.map(c => `<tr class="case-row ${selectedCase === c.idx ? "active" : ""}" data-case="${c.idx}"><td><strong>${c.id}</strong></td><td><span class="tag ${c.category < 2 ? "high" : c.category < 4 ? "medium" : "low"}">${t("categories")[c.category]}</span></td><td>${c.confidence}%<br><small class="muted">${t("confidencePatterns")[c.category]}</small></td><td><span class="tag ${c.status === 0 ? "high" : c.status === 1 ? "medium" : "low"}">${t("statuses")[c.status]}</span></td><td>${c.identity === 4 ? c.student : t("identities")[c.identity]}</td></tr>`).join("")}</tbody></table></div>`;

      const values = [66,69,73,60,50,84,78,74,50];

      const d = pts.map((p,i) => `${i ? "L" : "M"}${p.x},${p.y}`).join(" ");
      return `<svg class="trend-chart" viewBox="0 0 560 280">
        ${[50,60,70,80,90,100].map((v,i) => `<line x1="54" x2="520" y1="${220 - (v - 45) * 4.2}" y2="${220 - (v - 45) * 4.2}" stroke="#e8eef6"/><text x="22" y="${224 - (v - 45) * 4.2}" fill="#68798d" font-size="11">${v}</text>`).join("")}
        <path d="${d}" fill="none" stroke="#3f6fe5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="${d} L${pts[pts.length-1].x},230 L54,230 Z" fill="rgba(63,111,229,0.1)"/>
        ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="5" fill="${p.m === "Jan" || p.m === "May" ? "#d94f5f" : "#3f6fe5"}"></circle>`).join("")}

      $("modalIcon").className = `title-icon ${iconClass}`;
      $("modalClose").textContent = t("close");
      $("actionModal").classList.add("show");
      $("actionModal").setAttribute("aria-hidden", "false");
    }

    function appointmentSlots() {
      const base = new Date(2026, 4, 21);
      const pad = n => String(n).padStart(2, "0");
      return Array.from({ length: 7 }, (_, i) => {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        return {
          date: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,
          morningFull: i === 2,
          afternoonFull: i === 0
        };
      });
    }

    function showScheduleModal(mode = "student") {
      const rows = appointmentSlots().map(day => {
        const morningLabel = `${day.date} ${t("morning")}`;
        const afternoonLabel = `${day.date} ${t("afternoon")}`;
        return `
        <div class="schedule-row">
          <div class="schedule-date">${day.date}</div>
          <button type="button" class="slot ${day.morningFull ? "full" : "open"}" ${day.morningFull ? "disabled" : ""} data-slot="${escapeHtml(morningLabel)}">${t("morning")} · ${day.morningFull ? t("full") : t("available")}</button>
          <button type="button" class="slot ${day.afternoonFull ? "full" : "open"}" ${day.afternoonFull ? "disabled" : ""} data-slot="${escapeHtml(afternoonLabel)}">${t("afternoon")} · ${day.afternoonFull ? t("full") : t("available")}</button>
        </div>`;
      }).join("");
      showRichModal(t("appointmentTitle"), `
        <p>${t("appointmentSub")}</p>
        <div class="schedule-grid">${rows}</div>
        <div class="schedule-note">${t("scheduleHours")}</div>
        <div class="slot-confirm" id="slotConfirm">
          <span><strong>${t("selectedSlot")}:</strong> <span id="selectedSlotLabel"></span></span>
          <button class="primary-btn" id="confirmAppointment">${t("confirmAppointment")}</button>
        </div>
      `, mode === "student" ? "i-purple" : "i-green");
      let selectedSlot = "";
      document.querySelectorAll("[data-slot]").forEach(btn => btn.addEventListener("click", () => {
        selectedSlot = btn.dataset.slot;
        document.querySelectorAll("[data-slot]").forEach(item => item.classList.remove("selected"));
        btn.classList.add("selected");
        $("selectedSlotLabel").textContent = selectedSlot;
        $("slotConfirm").classList.add("show");
      }));
      $("confirmAppointment").addEventListener("click", () => {
        showRichModal(t("appointmentTitle"), `
          <div class="why-pill color-note green"><strong>${t("appointmentSuccess")}</strong><br>${escapeHtml(selectedSlot)}</div>
        `, mode === "student" ? "i-purple" : "i-green");
        showToast(t("appointmentSuccess"));
      });
    }

    function supportiveSuggestionSets(c) {
      const category = t("categories")[c.category].toLowerCase();
      if (lang === "zh") {
        return [
          [
            `你好，这里是 Dr. Sangwook HA，来自学生健康服务。SCWIS 注意到你本周可能存在${category}相关压力。这只是一次支持性问候，不会影响成绩或记录。你愿意了解一些资源，或预约一次自愿咨询吗？`,
            "你好，我想确认你最近是否还好。系统只显示出一些可能需要关注的健康模式，并不代表任何判断。你可以选择回复、预约，或只接收资源。",
            "你好，我注意到最近可能是学习压力较高的阶段。这里不会涉及成绩、纪律或任何惩罚性记录。如果你愿意，我们可以先从压力管理资源开始。"
          ],
          [
            `你好，我是 Dr. Sangwook HA。你的近期模式显示可能有${category}方面的变化。你不需要立即回复，但如果想聊聊或获取资源，我们可以提供支持。`,
            "你好，这是一条自愿的支持性联系。你可以选择预约、接收资源，或告诉我们当前不需要帮助。所有回复都会按照隐私规则处理。",
            "你好，我想轻轻确认一下你的近况。SCWIS 只帮助我们更早发现可能的支持需求，最终沟通始终由咨询人员负责。"
          ]
        ];
      }
      return [
        [
          `Hi, this is Dr. Sangwook HA from Student Wellness. SCWIS noticed signs that ${category} may be high this week. This is a supportive check-in only. Would you like help finding resources or booking a voluntary appointment?`,
          "Hi, I am checking in because this may be a stressful academic period. Nothing here affects grades or records. Support is available if you would like to talk or receive resources.",
          "Hi, I wanted to reach out because SCWIS flagged some wellness patterns that may indicate stress. You are not required to respond, but support is available if you would like it."
        ],
        [
          `Hi, this is Dr. Sangwook HA. Your recent wellness pattern suggests ${category} may be affecting your week. This message is supportive and voluntary. Would you like resources or a short appointment?`,
          "Hi, I hope you are doing okay. SCWIS highlighted a possible change in your wellness pattern, so I am reaching out with support options you can choose from.",
          "Hi, I am checking in from Student Wellness. You can ignore this, reply with a question, or book a voluntary chat if that would be useful."
        ]
      ];
    }

    function supportiveMessageModal() {
      const c = cases[selectedCase];
      const suggestionSets = supportiveSuggestionSets(c);
      let version = supportiveSuggestionVersion % suggestionSets.length;
      showRichModal(t("supportiveMessageTitle"), `
        <div class="why-pill color-note purple">${t("supportiveMessageIntro")}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;">
          <h4 style="margin:0;">${t("aiSuggestedReplies")}</h4>
          <button class="soft-btn" id="refreshSuggestions" type="button">↻ ${t("refreshSuggestions")}</button>
        </div>
        <div class="suggestion-list" id="suggestionList"></div>
        <h4 style="margin-top:14px;">${t("finalMessage")}</h4>
        <textarea class="message-draft" id="finalMessageDraft"></textarea>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px;"><button class="ghost-btn" id="cancelSupportiveMessage" type="button">${t("cancel")}</button><button class="primary-btn" id="sendSupportiveMessage" type="button">➤ ${t("sendMessage")}</button></div>
      `, "i-blue");

      function paintSuggestions(selectedIndex = 0) {
        const suggestions = suggestionSets[version];
        $("suggestionList").innerHTML = suggestions.map((s, i) => `<button type="button" class="suggestion-card ${i === selectedIndex ? "active" : ""}" data-suggestion="${i}">${escapeHtml(s)}</button>`).join("");
        $("finalMessageDraft").value = suggestions[selectedIndex];
        document.querySelectorAll("[data-suggestion]").forEach(btn => btn.addEventListener("click", () => {
          const index = Number(btn.dataset.suggestion);
          document.querySelectorAll("[data-suggestion]").forEach(item => item.classList.remove("active"));
          btn.classList.add("active");
          $("finalMessageDraft").value = suggestions[index];
        }));
      }

      paintSuggestions();
      $("refreshSuggestions").addEventListener("click", () => {
        supportiveSuggestionVersion += 1;
        version = supportiveSuggestionVersion % suggestionSets.length;
        paintSuggestions();
      });
      $("cancelSupportiveMessage").addEventListener("click", closeModal);
      $("sendSupportiveMessage").addEventListener("click", () => {
        closeModal();
        showToast(t("messageSent"));
      });
    }

    function handleCounselorAction(index) {
      const c = cases[selectedCase];
      if (index === 0) {
        hiddenCaseIds.add(c.id);
        const next = cases.findIndex(item => !hiddenCaseIds.has(item.id));
        selectedCase = next >= 0 ? next : 0;
        showToast(t("counselorActionBodies")[0]);
        renderCounselor();
        return;
      }
      if (index === 1) {
        supportiveMessageModal();
        return;
      }
      if (index === 2) {
        showScheduleModal("counselor");
        return;
      }
      showModal(t("counselorButtons")[index], t("counselorActionBodies")[index], "i-amber");
    }

    function showChat(mode = "student") {
      const isStudent = mode === "student";
      $("chatTitle").textContent = isStudent ? t("chatWithCounselor") : t("chatWithStudent");
      $("chatSubtitle").textContent = t("chatPrivate");
      $("chatInput").placeholder = isStudent ? t("studentChatPlaceholder") : t("chatPlaceholder");
      $("chatThread").innerHTML = isStudent ? `
        <div class="chat-bubble counselor">Hi ${current.name}, this is Dr. Sangwook HA. I noticed your recent check-in showed some stress. This is just a supportive check-in.</div>
        <div class="chat-bubble student">Thank you. I have been busy with assignments and may want some stress resources.</div>
      ` : `
        <div class="chat-bubble counselor">Hi Dr. Sangwook HA, I have been busy with assignments and may want some stress resources.</div>
        <div class="chat-bubble student">Thanks for telling me. We can start with resources, and you can choose a voluntary appointment if helpful.</div>
      `;
      $("chatDrawer").classList.add("show");
      $("chatDrawer").setAttribute("aria-hidden", "false");
    }

    function closeChat() {
      $("chatDrawer").classList.remove("show");
      $("chatDrawer").setAttribute("aria-hidden", "true");
    }

    function closeModal() {
      $("actionModal").classList.remove("show");
      $("actionModal").setAttribute("aria-hidden", "true");
    }

    function loginAs(key) {
      currentKey = key || "logan";
      current = accounts[key] || accounts.logan;
      if (current.role === "student") {
        wellnessHistory = studentWellnessHistories[currentKey];
        consentHistory = studentConsentHistories[currentKey];
      }
      activeTab = navKeys[current.role][0];
      $("loginUser").value = current.user;
      $("loginPass").value = current.pass;
      $("loginError").classList.remove("show");
      document.body.classList.remove("locked");
      renderAll();
    }

    function doLogin() {
      const user = $("loginUser").value.trim().toLowerCase();
      const pass = $("loginPass").value.trim();
      let key = null;
      if (user === "2330024099" && pass === "123456") key = "logan";
      if (user === "2330024121" && pass === "123456") key = "liam";
      if (user === "counselor001" && pass === "654321") key = "counselor";
      if ((user === "amin001" || user === "admin001") && pass === "666666") key = "admin";
      if (key) loginAs(key); else $("loginError").classList.add("show");
    }

    function setLanguage(nextLang) {
      lang = nextLang;
      renderAll();
    }

    $("loginBtn").addEventListener("click", doLogin);
    $("loginUser").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    $("loginPass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    $("logoutBtn").addEventListener("click", () => document.body.classList.add("locked"));
    $("loginLang").addEventListener("change", e => setLanguage(e.target.value));
    $("systemLang").addEventListener("change", e => setLanguage(e.target.value));
    $("modalClose").addEventListener("click", closeModal);
    $("actionModal").addEventListener("click", e => { if (e.target.id === "actionModal") closeModal(); });
    $("chatClose").addEventListener("click", closeChat);
    $("chatSend").addEventListener("click", () => {
      const value = $("chatInput").value.trim();
      if (!value) return;
      const div = document.createElement("div");
      div.className = "chat-bubble student";
      div.textContent = value;
      $("chatThread").appendChild(div);
      $("chatInput").value = "";
      $("chatThread").scrollTop = $("chatThread").scrollHeight;
    });
    $("chatInput").addEventListener("keydown", e => { if (e.key === "Enter") $("chatSend").click(); });

    const params = new URLSearchParams(location.search);
    if (["en","zh","ko","ja"].includes(params.get("lang"))) lang = params.get("lang");
    const hash = location.hash.replace("#", "");
    if (["student","counselor","admin"].includes(hash)) {
      const key = hash === "student" ? "logan" : hash;
      currentKey = key;
      current = accounts[key];
      if (current.role === "student") {
        wellnessHistory = studentWellnessHistories[currentKey];
        consentHistory = studentConsentHistories[currentKey];
      }
      activeTab = navKeys[current.role][0];
      document.body.classList.remove("locked");
    }
    renderAll();
  </script>
</body>
</html>
