<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCWIS Care360</title>
  <style>
    :root {
      --ink: #1b2a41;
      --muted: #68798d;
      --line: #deebf6;
      --soft-blue: #eaf5ff;
      --blue: #3f6fe5;
      --sky: #58a9e8;
      --green: #3a9f6a;
      --mint: #eaf8f0;
      --purple: #7b61df;
      --lavender: #f3efff;
      --amber: #d78b22;
      --cream: #fff8e8;
      --rose: #d94f5f;
      --rose-soft: #fff0f2;
      --teal: #238c8f;
      --panel: #ffffff;
      --shadow: 0 16px 34px rgba(28, 57, 95, 0.08);
      --radius: 12px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
      color: var(--ink);
      background: #fff;
      letter-spacing: 0;
    }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    body.locked .app-shell { display: none; }
    body.locked .login-screen { display: grid; }

    .login-screen {
      min-height: 100vh;
      display: none;
      grid-template-columns: minmax(420px, 0.95fr) minmax(420px, 1.05fr);
      background:
        radial-gradient(circle at 8% 12%, rgba(88,169,232,0.24), transparent 28%),
        radial-gradient(circle at 92% 80%, rgba(58,159,106,0.23), transparent 30%),
        linear-gradient(135deg, #16355b 0%, #1e5f82 54%, #eff8ff 54.2%, #ffffff 100%);
      padding: 42px;
      gap: 34px;
      align-items: center;
    }
    .login-card, .login-demo {
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 22px;
      box-shadow: 0 28px 70px rgba(12, 39, 70, 0.22);
    }
    .login-card { padding: 34px; max-width: 500px; justify-self: end; width: 100%; }
    .login-demo { padding: 24px; width: 100%; max-width: 630px; }
    .brand-row { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
    .login-logo-hero {
      width: 100%; height: 172px; object-fit: contain; object-position: center;
      border-radius: 18px; border: 1px solid rgba(211,230,247,0.95);
      box-shadow: 0 18px 34px rgba(12, 39, 70, 0.16);
      margin-bottom: 22px; padding: 10px 14px;
      background: linear-gradient(135deg, #eef8ff 0%, #f8fcff 100%);
    }
    .brand-mark {
      width: 58px; height: 58px; border-radius: 18px;
      background: linear-gradient(135deg, var(--blue), var(--green));
      color: white; display: grid; place-items: center; font-weight: 900; font-size: 20px;
      box-shadow: 0 14px 26px rgba(63,111,229,0.25);
    }
    .brand-logo-mark {
      width: 58px; height: 58px; border-radius: 18px; object-fit: cover; object-position: center;
      border: 1px solid rgba(255,255,255,0.9); background: #102033;
      box-shadow: 0 14px 26px rgba(63,111,229,0.25);
    }
    h1, h2, h3, h4, p { margin: 0; }
    h1 { font-size: 34px; line-height: 1.08; }
    .muted { color: var(--muted); }
    .badge-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0 24px; }
    .badge {
      display: inline-flex; align-items: center; gap: 7px;
      border-radius: 999px; padding: 7px 11px;
      background: #f5f9ff; border: 1px solid #d9e8f8;
      color: #244563; font-weight: 800; font-size: 12px;
    }
    .badge::before { content: ""; width: 7px; height: 7px; border-radius: 99px; background: var(--green); }
    .field { display: grid; gap: 7px; margin: 13px 0; }
    .field label { color: #3d526b; font-weight: 800; font-size: 13px; }
    .field input, .field select, .soft-select {
      border: 1px solid #ccdaea; background: white; color: var(--ink);
      border-radius: 10px; padding: 12px 13px; outline: none;
    }
    .field input:focus, .field select:focus, .soft-select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(63,111,229,0.12); }
    .primary-btn, .soft-btn, .ghost-btn, .danger-btn {
      border: 0; border-radius: 10px; padding: 11px 14px; font-weight: 850;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .primary-btn { background: var(--blue); color: white; box-shadow: 0 12px 22px rgba(63,111,229,0.22); }
    .soft-btn { background: #edf4ff; color: var(--blue); }
    .ghost-btn { background: white; color: #31506f; border: 1px solid #d7e5f4; }
    .ghost-btn.active { border-color: var(--blue); background: #eef4ff; color: var(--blue); }
    .danger-btn { background: var(--rose-soft); color: #b92c44; }
    .login-actions { display: grid; gap: 10px; margin-top: 18px; }
    .login-error { display: none; color: #b92c44; font-weight: 800; font-size: 13px; }
    .login-error.show { display: block; }
    .demo-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 13px; margin-top: 18px; }
    .demo-account {
      text-align: left; border: 1px solid #d7e5f4; background: #fff; border-radius: 14px;
      padding: 15px; display: grid; gap: 8px; transition: transform .18s ease, box-shadow .18s ease;
    }
    .demo-account:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .demo-account strong { font-size: 15px; }
    .demo-account small { color: var(--muted); line-height: 1.5; }
    .language-row { display: flex; justify-content: space-between; align-items: center; gap: 14px; margin-bottom: 18px; }

    .app-shell { min-height: 100vh; display: grid; grid-template-rows: auto minmax(0, 1fr); background: white; }
    .app-topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: auto minmax(360px, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 12px 24px;
      background: rgba(255,255,255,0.94);
      border-bottom: 1px solid #e1ebf5;
      backdrop-filter: blur(14px);
    }
    .top-brand { display: flex; align-items: center; gap: 12px; min-width: 230px; }
    .top-brand img {
      width: 138px; height: 52px; object-fit: contain; object-position: center;
      border: 1px solid #d7e5f4; border-radius: 12px; background: #f7fbff; padding: 4px 8px;
    }
    .top-brand h3 { font-size: 18px; line-height: 1.1; }
    .top-nav-list {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      overflow-x: auto;
      padding: 4px;
    }
    .sidebar {
      background: linear-gradient(180deg, #dff0ff 0%, #edf7ff 55%, #f6fbff 100%);
      border-right: 1px solid #d5e8f8;
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    .side-brand { display: flex; gap: 12px; align-items: center; }
    .side-brand .brand-mark { width: 44px; height: 44px; border-radius: 14px; font-size: 15px; }
    .side-brand .brand-logo-mark { width: 52px; height: 52px; border-radius: 15px; }
    .side-logo-strip {
      width: 100%; height: 118px; object-fit: contain; object-position: center;
      padding: 8px 10px;
      border-radius: 16px; border: 1px solid #d3e6f7;
      background: linear-gradient(135deg, #eaf5ff 0%, #f7fbff 100%);
      box-shadow: 0 14px 28px rgba(28, 57, 95, 0.09);
    }
    .user-card {
      background: rgba(255,255,255,0.72);
      border: 1px solid #d3e6f7;
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 9px;
    }
    .avatar {
      width: 38px; height: 38px; border-radius: 13px; background: #fff;
      display: grid; place-items: center; color: var(--blue); font-weight: 900;
      border: 1px solid #c7def4;
    }
    .nav-list { display: grid; gap: 9px; }
    .nav-btn {
      border: 1px solid transparent; background: transparent; color: #31506f;
      border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px;
      text-align: left; font-weight: 850;
    }
    .top-nav-list .nav-btn { padding: 10px 14px; white-space: nowrap; background: #f4f8fc; border-color: #e1ebf5; }
    .nav-btn:hover { background: rgba(255,255,255,0.56); }
    .nav-btn.active { background: #fff; color: var(--blue); border-color: #cddff7; box-shadow: 0 10px 20px rgba(63,111,229,0.08); }
    .nav-icon {
      width: 30px; height: 30px; border-radius: 10px; display: grid; place-items: center;
      background: #eef5ff; color: var(--blue);
    }
    .sidebar-spacer { flex: 1; }
    .logout { width: 100%; }

    .main {
      background: #fff;
      min-width: 0;
      padding: 28px 34px 50px;
      width: min(1240px, 100%);
      justify-self: center;
    }
    .topbar {
      display: flex; justify-content: space-between; align-items: flex-start; gap: 20px;
      padding-bottom: 20px; border-bottom: 1px solid #e7eef6; margin-bottom: 24px;
    }
    .topbar h2 { font-size: 28px; display: flex; align-items: center; gap: 10px; }
    .page-kicker { color: var(--muted); margin-top: 6px; line-height: 1.5; }
    .lang-control { display: flex; align-items: center; gap: 10px; color: #526a83; font-weight: 800; }
    .top-actions { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: flex-end; }
    .top-logo {
      display: flex; align-items: center; gap: 10px;
      border: 1px solid #d7e5f4; background: #f7fbff; border-radius: 14px; padding: 6px 10px;
      color: #31506f; font-weight: 900;
    }
    .top-logo img { width: 178px; height: 58px; object-fit: contain; object-position: center; border-radius: 10px; }
    .profile-menu { position: relative; }
    .profile-trigger {
      border: 1px solid #d7e5f4;
      background: #fff;
      border-radius: 999px;
      padding: 6px 10px 6px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 18px rgba(28,57,95,0.06);
    }
    .profile-copy { display: grid; line-height: 1.1; text-align: left; }
    .profile-copy strong { font-size: 12px; }
    .profile-copy small { font-size: 11px; color: var(--muted); font-weight: 800; }
    .profile-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      width: 280px;
      display: none;
      gap: 8px;
      padding: 12px;
      background: #fff;
      border: 1px solid #d7e5f4;
      border-radius: 14px;
      box-shadow: 0 20px 55px rgba(12,39,70,0.18);
    }
    .profile-dropdown.show { display: grid; }
    .switch-account {
      width: 100%;
      border: 1px solid #e1ebf5;
      background: #f8fbff;
      border-radius: 10px;
      padding: 10px;
      display: grid;
      gap: 3px;
      text-align: left;
      color: #31506f;
    }
    .switch-account strong { color: var(--ink); }

    .screen { display: none; }
    .screen.active { display: block; }
    .section { margin-top: 22px; }
    .section-head {
      display: flex; justify-content: space-between; align-items: flex-end; gap: 16px;
      margin-bottom: 15px;
    }
    .section-title { display: flex; align-items: center; gap: 11px; }
    .title-icon {
      width: 36px; height: 36px; border-radius: 12px; display: grid; place-items: center;
      color: white; font-weight: 900; flex: 0 0 auto;
    }
    .i-blue { background: var(--blue); }
    .i-green { background: var(--green); }
    .i-purple { background: var(--purple); }
    .i-amber { background: var(--amber); }
    .i-rose { background: var(--rose); }
    .i-teal { background: var(--teal); }
    .card {
      background: var(--panel); border: 1px solid #e0eaf4; border-radius: var(--radius);
      box-shadow: var(--shadow); padding: 20px;
    }
    .card.tint-blue { background: linear-gradient(180deg, #f6fbff, #fff); border: 1px solid rgba(63,111,229,0.26); }
    .card.tint-green { background: linear-gradient(180deg, #f1fbf5, #fff); border: 1px solid rgba(58,159,106,0.28); }
    .card.tint-purple { background: linear-gradient(180deg, #f6f2ff, #fff); border: 1px solid rgba(123,97,223,0.28); }
    .card.tint-amber { background: linear-gradient(180deg, #fff9ed, #fff); border: 1px solid rgba(215,139,34,0.3); }
    .grid { display: grid; gap: 18px; }
    .two { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .three { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .four { grid-template-columns: repeat(4, minmax(0,1fr)); }
    .five { grid-template-columns: repeat(5, minmax(0,1fr)); }
    .proposal-hero {
      display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(280px, .8fr);
      gap: 18px; align-items: stretch;
    }
    .hero-copy {
      border-radius: 16px; padding: 22px;
      background: linear-gradient(135deg, #f5fbff 0%, #ffffff 100%);
      border: 1px solid #dce8f5;
    }
    .hero-copy h3 { font-size: 26px; line-height: 1.18; }
    .principle-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 12px; margin-top: 16px; }
    .principle-card {
      border: 1px solid #deebf6; border-radius: 14px; padding: 14px;
      background: #fff; display: grid; gap: 7px;
    }
    .principle-card strong { color: #17365d; }
    .mini-stat-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 10px; }
    .mini-stat {
      border: 1px solid #dce8f5; border-radius: 14px; padding: 14px;
      background: rgba(255,255,255,0.78);
    }
    .mini-stat strong { display: block; font-size: 24px; color: var(--blue); margin-bottom: 3px; }
    .source-passports { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
    .source-card {
      border: 1px solid #deebf6; border-radius: 14px; padding: 14px;
      background: #fff; border-left: 4px solid var(--blue);
    }
    .source-card.green { border-left-color: var(--green); }
    .source-card.purple { border-left-color: var(--purple); }
    .source-card.amber { border-left-color: var(--amber); }
    .source-card.teal { border-left-color: var(--teal); }
    .layer-stack { display: grid; gap: 10px; }
    .layer-card {
      display: grid; grid-template-columns: 42px minmax(0,1fr); gap: 12px; align-items: start;
      border: 1px solid #deebf6; border-radius: 14px; padding: 14px; background: #fff;
    }
    .layer-no {
      width: 42px; height: 42px; border-radius: 13px; display: grid; place-items: center;
      background: #edf4ff; color: var(--blue); font-weight: 950;
    }
    .timeline-grid { display: grid; grid-template-columns: repeat(5,minmax(160px,1fr)); gap: 12px; overflow: auto; padding-bottom: 4px; }
    .timeline-card {
      border: 1px solid #deebf6; border-radius: 14px; padding: 15px; background: #fff;
      min-height: 160px; display: grid; align-content: start; gap: 8px;
    }
    .architecture-map { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 14px; }
    .arch-block {
      border-radius: 16px; border: 1px solid #dce8f5; background: #fff;
      padding: 18px; min-height: 170px; display: grid; gap: 9px;
    }
    .budget-row { display: grid; gap: 10px; margin-top: 12px; }
    .budget-line { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: center; }
    .bar-track { height: 9px; border-radius: 999px; background: #e8f0f8; overflow: hidden; margin-top: 6px; }
    .bar-fill { height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--blue), var(--green)); }
    .aside { grid-template-columns: minmax(0,1.55fr) minmax(300px,0.65fr); align-items: start; }
    .metric {
      min-height: 104px; border-radius: 12px; padding: 17px; border: 1px solid #e1ebf5;
      background: #fff; display: grid; align-content: space-between; gap: 6px;
      box-shadow: 0 12px 24px rgba(28,57,95,0.06);
    }
    .metric .label { color: var(--muted); font-size: 12px; font-weight: 850; }
    .metric .value { font-size: 29px; font-weight: 950; color: var(--blue); }
    .metric .hint { color: var(--muted); font-size: 12px; }
    .metric.green .value { color: var(--green); }
    .metric.purple .value { color: var(--purple); }
    .metric.amber .value { color: var(--amber); }
    .metric.rose .value { color: var(--rose); }
    .metric.teal .value { color: var(--teal); }

    .student-layout { grid-template-columns: minmax(0, 1fr) 270px; align-items: start; }
    .privacy-mini { display: grid; gap: 14px; position: sticky; top: 24px; }
    .privacy-mini .card { padding: 16px; box-shadow: 0 10px 20px rgba(28,57,95,0.06); }
    .student-guardrail-footer {
      border-top: 1px solid #dfeaf5;
      padding-top: 18px;
      margin-top: 2px;
    }
    .guardrail-cards { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 14px; }
    .guardrail-cards .card { box-shadow: 0 10px 20px rgba(28,57,95,0.05); }
    .check-list { list-style: none; padding: 0; margin: 12px 0 0; display: grid; gap: 9px; }
    .check-list li { display: flex; align-items: flex-start; gap: 9px; color: #344b64; line-height: 1.45; }
    .check { color: var(--green); font-weight: 950; }
    .welcome-panel {
      display: grid; grid-template-columns: minmax(0,1fr) 160px minmax(260px,0.9fr);
      gap: 16px; align-items: stretch;
    }
    .status-pill {
      border: 1px solid #dbe7f3; border-radius: 14px; padding: 18px; background: #fff;
      display: grid; align-content: center; gap: 8px;
    }
    .status-pill strong { color: var(--green); font-size: 23px; }
    .why-box {
      background: #f2f6ff; border-left: 4px solid var(--purple);
      border-radius: 12px; padding: 18px; display: grid; gap: 12px;
    }
    .why-grid { display: grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap: 12px; }
    .why-pill { background: rgba(255,255,255,0.76); border-radius: 10px; padding: 12px; color: #415872; line-height: 1.45; }
    .color-note { border: 1px solid rgba(63,111,229,0.26); background: #f6fbff; }
    .color-note.green { border-color: rgba(58,159,106,0.28); background: #f3fbf6; }
    .color-note.purple { border-color: rgba(123,97,223,0.28); background: #f7f3ff; }
    .color-note.amber { border-color: rgba(215,139,34,0.3); background: #fff9ed; }
    .checkin-grid { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 16px; }
    .checkin-card { background: #f8fbff; border: 1px solid #e2ebf5; border-radius: 14px; padding: 17px; min-height: 150px; }
    .wellness-builder {
      display: grid;
      grid-template-columns: repeat(2,minmax(0,1fr));
      gap: 18px;
      align-items: start;
      background: #f8fbff;
      border: 1px solid #dfeaf5;
      border-radius: 16px;
      padding: 18px;
    }
    .wellness-panel {
      background: #fff;
      border: 1px solid #e2ebf5;
      border-radius: 14px;
      padding: 16px;
      display: grid;
      gap: 12px;
      align-content: start;
      grid-auto-rows: min-content;
    }
    .mood-choice-list { display: grid; gap: 12px; align-content: start; }
    .mood-choice {
      width: 100%;
      border: 1px solid #d7e5f4;
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #31506f;
      font-weight: 900;
      text-align: left;
      min-height: 76px;
      align-items: center;
      font-size: 18px;
    }
    .mood-choice.active {
      border-color: var(--blue);
      background: #eef4ff;
      box-shadow: 0 0 0 3px rgba(63,111,229,0.1);
    }
    .status-scale-list { display: grid; gap: 12px; }
    .status-scale {
      background: #f7fbff;
      border: 1px solid #e2ebf5;
      border-radius: 12px;
      padding: 12px;
    }
    .status-scale-head { display: flex; justify-content: space-between; gap: 12px; align-items: center; font-weight: 900; }
    .reflection-box {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid #d7e5f4;
      border-radius: 12px;
      padding: 12px;
      color: var(--ink);
      line-height: 1.55;
      margin-top: 14px;
      font: inherit;
    }
    .mood-grid { display: grid; grid-template-columns: repeat(3, 68px); gap: 10px; margin-top: 12px; }
    .mood-btn {
      height: 60px; border-radius: 14px; border: 2px solid #d9e6f4; background: white; font-size: 28px;
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    }
    .mood-btn.active { border-color: var(--blue); background: #eef4ff; box-shadow: 0 0 0 3px rgba(63,111,229,0.12); }
    .range-row { display: grid; gap: 12px; margin-top: 17px; }
    input[type="range"] { width: 100%; accent-color: var(--blue); }
    .range-labels { display: flex; justify-content: space-between; color: #8a9bb0; font-size: 12px; font-weight: 800; }
    .value-pill { color: #4b5f78; font-weight: 900; }
    .history-chart { width: 100%; height: 230px; }
    .history-list { display: grid; gap: 12px; margin-top: 12px; }
    .history-item {
      display: flex; justify-content: space-between; gap: 18px; align-items: flex-start;
      border-left: 3px solid var(--green); padding: 10px 0 10px 14px;
    }
    .history-item p { color: #5d7189; margin-top: 7px; line-height: 1.6; }
    .history-score { color: var(--green); font-weight: 950; }
    .toggle-row {
      display: flex; justify-content: space-between; align-items: center; gap: 16px;

    .tag.low { background: var(--mint); color: var(--green); }

    .case-alert-layout { grid-template-columns: minmax(0,1.45fr) minmax(330px,.75fr); align-items: start; }

      border: 1px solid #e1ebf5;
      border-radius: 14px;

      box-shadow: 0 12px 24px rgba(28,57,95,0.06);
      padding: 20px;
      display: grid;
      gap: 8px;
    }

    .review-metric-card.purple .value { color: var(--purple); }
    .review-metric-card.green .value { color: var(--green); }
    .review-metric-card.rose .value { color: var(--rose); }
    .privacy-guarantee {

      border: 1px solid #bdebd4;
      border-radius: 12px;

      display: flex;
      align-items: flex-start;
      gap: 13px;
      color: #2c6a55;
      line-height: 1.55;
    }
    .journey-track {
      display: grid; grid-template-columns: repeat(7, minmax(140px,1fr)); gap: 14px;
      overflow-x: auto; padding-bottom: 8px;

      background: #fff; display: grid; gap: 10px;

    .journey-step:nth-child(6) .bubble { background: var(--amber); }

    function rangeCard(id, label, val, labels) {
      return `<div class="checkin-card"><h4>${label}</h4><div class="range-row"><input type="range" min="0" max="10" value="${val}" id="${id}Range"><div style="display:flex;justify-content:flex-end;"><span class="value-pill" id="${id}Value">${val}/10</span></div><div class="range-labels"><span>${labels[0]}</span><span>${labels[1]}</span><span>${labels[2]}</span></div></div></div>`;
    }

    function historyChart() {
      if (!wellnessHistory.length) return `<p class="muted">${t("emptyHistory")}</p>`;
      const pts = wellnessHistory.map((r, i) => ({ x: 52 + i * (480 / Math.max(1, wellnessHistory.length - 1)), y: 185 - (r.score / 100) * 140, r }));
      const d = pts.map((p, i) => `${i ? "L" : "M"}${p.x},${p.y}`).join(" ");
      return `<svg class="history-chart" viewBox="0 0 590 240">
        <line x1="52" y1="45" x2="552" y2="45" stroke="#e7eef6"/><line x1="52" y1="115" x2="552" y2="115" stroke="#e7eef6"/><line x1="52" y1="185" x2="552" y2="185" stroke="#e7eef6"/>
        <path d="${d}" fill="none" stroke="#3f6fe5" stroke-width="4" stroke-linecap="round"/>
        ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#3f6fe5"></circle>`).join("")}
        <text x="24" y="49" fill="#68798d" font-size="12">100</text><text x="31" y="119" fill="#68798d" font-size="12">60</text><text x="31" y="189" fill="#68798d" font-size="12">20</text>
        <text x="258" y="224" fill="#68798d" font-size="12">${t("exportHeaders")[0]}</text>
      </svg>`;
    }

    function historyList() {
      if (!wellnessHistory.length) return `<p class="muted">${t("emptyHistory")}</p>`;
      return wellnessHistory.slice().reverse().map((r, idx) => {
        const actualIndex = wellnessHistory.length - 1 - idx;
        return `<div class="history-item"><div><strong>${r.date}</strong><p>${t("mood")}: ${r.mood} &nbsp; ${t("stress")}: ${r.stress}/10 &nbsp; ${t("sleep")}: ${r.sleep}/10 &nbsp; ${t("social")}: ${r.social}/10 &nbsp; ${t("activity")}: ${r.activity}/10</p></div><div><span class="history-score">${t("score")}: ${r.score}/100</span><br><button class="danger-btn" data-delete-record="${actualIndex}" style="margin-top:8px">${t("deleteOne")}</button></div></div>`;
      }).join("");
    }

        ["gym", copy("Gym access patterns", "健身房访问模式"), copy("Check-in/check-out rhythm used only as a wellness context signal.", "进出节奏仅作为健康背景信号。"), true],
        ["dining", copy("Dining regularity", "餐饮规律性"), copy("Frequency patterns only; no individual purchase details.", "只看频率模式，不看具体购买内容。"), false],
        ["library", copy("Library building access", "图书馆楼宇访问"), copy("Study-location pattern, never browsing history.", "学习场所模式，不含浏览历史。"), true],

        [copy("De-identification at ingestion", "进入系统即去标识化"), copy("Personal identifiers are separated before BI or AI processing.", "在 BI 或 AI 处理前先分离个人身份信息。")],
        [copy("24-hour revocation purge", "24 小时撤回清除"), copy("Raw data linked to revoked consent is automatically purged.", "撤回同意相关的原始数据会自动清除。")],
        [copy("Role-separated data marts", "按角色隔离数据集市"), copy("Students, counselors, and administrators see different protected views.", "学生、咨询师、管理员看到不同的受保护视图。")]
      ];
      return `<div class="grid">
        <div class="proposal-hero">
          <div class="card">
            <div class="section-title"><span class="title-icon i-blue">◎</span><div><h3>${copy("Consent Gate", "同意闸门")} <span class="badge">${t("consentBased")}</span></h3><p class="page-kicker">${copy("Privacy governance is a non-bypassable pre-processing layer. You decide which signals may enter SCWIS Care360.", "隐私治理是不可绕过的预处理层。你决定哪些信号可以进入 SCWIS Care360。")}</p></div></div>

        <div class="grid two">

          <div class="card">
            <h3>${t("supportPreferences")}</h3>
            <div class="grid two" style="margin-top:14px;">

              <label class="field"><span>${t("supportType")}</span><select class="soft-select">${t("supportOptions").map(x => `<option>${x}</option>`).join("")}</select></label>

    function toggleRow(id, title, desc, checked) {
      return `<label class="toggle-row"><span><strong>${title}</strong><span>${desc}</span></span><span class="switch"><input type="checkbox" data-consent-key="${id}" ${checked ? "checked" : ""}><span class="slider"></span></span></label>`;

    function renderConsentLog() {
      return consentHistory.slice().reverse().map(item => `<li><span class="dot"></span><span>${item.date} — ${t(item.key)}: ${t(item.state)}</span></li>`).join("");

    function studentSupport() {

        ["i-green","2", copy("Peer and student-led support", "同伴与学生主导支持"), copy("A lower-pressure route before professional contact if preferred.", "如学生偏好，可先使用低压力的同伴支持路径。")],
        ["i-purple","3", copy("Voluntary counseling appointment", "自愿咨询预约"), copy("Students choose available slots; no appointment is forced by AI.", "学生自主选择时段，AI 不会强制安排。")],
        ["i-teal","4", copy("Counselor follow-up", "咨询师跟进"), copy("Only trained staff decide whether outreach is appropriate.", "是否联系由受训人员决定。")],
        ["i-amber","5", copy("Crisis support access", "危机支持入口"), copy("Always visible and available regardless of analytics opt-out.", "无论是否退出预测分析，该入口始终可见可用。")]

            <div style="display:flex;gap:10px;margin-top:14px;"><button class="soft-btn" data-student-action="2">${t("book")}</button><button class="ghost-btn" data-student-action="3">${t("reply")}</button></div>

            <div class="why-pill color-note amber" style="margin-top:12px;"><strong>${copy("Purpose limitation", "目的限制")}</strong><br>${copy("Data is used only for wellness support, never for grades, discipline, scholarships, or campus access.", "数据只用于健康支持，绝不用于成绩、纪律、奖学金或校园准入。")}</div>
          </div>

    function bindStudentControls() {
      document.querySelectorAll("[data-mood]").forEach(btn => btn.addEventListener("click", () => { selectedMood = btn.dataset.mood; renderStudent(); }));
      ["stress","sleep","workload","social","activity"].forEach(id => {
        const range = $(id + "Range");
        const value = $(id + "Value");
        if (range && value) range.addEventListener("input", () => value.textContent = range.value + "/10");
      });
      const submit = $("submitCheckin");
      if (submit) submit.addEventListener("click", submitCheckin);
      const download = $("downloadHistory");
      if (download) download.addEventListener("click", downloadHistory);
      const del = $("deleteHistory");
      if (del) del.addEventListener("click", () => {
        studentWellnessHistories[currentKey] = [];
        wellnessHistory = studentWellnessHistories[currentKey];
        showToast(t("toastDeleted"));
        renderStudent();
      });
      document.querySelectorAll("[data-delete-record]").forEach(btn => btn.addEventListener("click", () => { wellnessHistory.splice(Number(btn.dataset.deleteRecord), 1); renderStudent(); }));
      document.querySelectorAll("[data-consent-key]").forEach(input => input.addEventListener("change", () => {
        consentHistory.push({ date: now(), key: input.dataset.consentKey, state: input.checked ? "enabled" : "disabled" });
        $("consentLog").innerHTML = renderConsentLog();
      }));
      const predictive = $("predictiveBtn");
      if (predictive) predictive.addEventListener("click", () => {
        predictiveEnabled = !predictiveEnabled;
        consentHistory.push({ date: now(), key:"predictive", state: predictiveEnabled ? "enabled" : "disabled" });
        renderStudent();
      });
      const save = $("savePrefs");
      if (save) save.addEventListener("click", () => { consentHistory.push({ date: now(), key:"supportPreferences", state:"savedState" }); showToast(t("toastSaved")); renderStudent(); activeTab = "privacy"; });
      document.querySelectorAll("[data-student-action]").forEach(btn => btn.addEventListener("click", () => {
        const index = Number(btn.dataset.studentAction);
        if (index === 0) showChat("student");
        else if (index === 2) showScheduleModal("student");
        else showModal(t("studentActionTitles")[index], t("studentActionBodies")[index], ["i-green","i-amber"][index - 1] || "i-blue");
      }));
    }

    function submitCheckin() {
      const stress = Number($("stressRange").value);
      const sleep = Number($("sleepRange").value);
      const workload = Number($("workloadRange").value);
      const social = Number($("socialRange").value);
      const activity = Number($("activityRange").value);
      const score = Math.round((sleep + social + activity + (10 - stress) + (10 - Math.max(0, workload - 5))) / 5 * 10);
      wellnessHistory.push({ date: now(), score, mood: selectedMood, stress, sleep, social, activity, workload });
      showToast(t("toastSubmitted"));
      renderStudent();
    }

    function downloadHistory() {
      const rows = [t("exportHeaders"), ...wellnessHistory.map(r => [r.date, r.score, r.mood, r.stress, r.sleep, r.social, r.activity, r.workload])];
      const html = `<html><meta charset="utf-8"><table>${rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join("")}</tr>`).join("")}</table></html>`;
      const blob = new Blob([html], { type:"application/vnd.ms-excel;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "SCWIS-wellness-history.xls";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast(t("toastDownloaded"));
    }

      const body = activeTab === "alerts" ? counselorAlerts() : activeTab === "case" ? counselorCaseReview() : counselorJourney();

      document.querySelectorAll("[data-tab]").forEach(btn => btn.addEventListener("click", () => { activeTab = btn.dataset.tab; renderAll(); }));
      document.querySelectorAll("[data-case]").forEach(row => row.addEventListener("click", () => { selectedCase = Number(row.dataset.case); renderAll(); }));
      document.querySelectorAll("[data-counselor-action]").forEach(btn => btn.addEventListener("click", () => {
        const index = Number(btn.dataset.counselorAction);
        handleCounselorAction(index);

      document.querySelectorAll("[data-ai-feedback]").forEach(btn => btn.addEventListener("click", () => {
        document.querySelectorAll("[data-ai-feedback]").forEach(item => item.classList.remove("active"));
        btn.classList.add("active");

        showToast(`${label}: ${t("feedbackSaved")}`);

      document.querySelectorAll("[data-counselor-chat]").forEach(btn => btn.addEventListener("click", () => showChat("counselor")));
      const filter = $("riskFilter");
      if (filter) filter.addEventListener("change", () => renderRiskTable(filter.value));
    }

    function now() {

    }

    function showToast(message) {
      document.querySelectorAll(".toast").forEach(x => x.remove());
      const div = document.createElement("div");
      div.className = "toast";
      div.textContent = message;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 2200);
    }

    function appointmentSlots() {
      const base = new Date(2026, 4, 21);
      const pad = n => String(n).padStart(2, "0");
      return Array.from({ length: 7 }, (_, i) => {
        const d = new Date(base);
        d.setDate(base.getDate() + i);
        return {
          date: `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`,
          morningFull: i === 2,
          afternoonFull: i === 0
        };
      });
    }

    function showScheduleModal(mode = "student") {
      const rows = appointmentSlots().map(day => {
        const morningLabel = `${day.date} ${t("morning")}`;
        const afternoonLabel = `${day.date} ${t("afternoon")}`;
        return `
        <div class="schedule-row">
          <div class="schedule-date">${day.date}</div>
          <button type="button" class="slot ${day.morningFull ? "full" : "open"}" ${day.morningFull ? "disabled" : ""} data-slot="${escapeHtml(morningLabel)}">${t("morning")} · ${day.morningFull ? t("full") : t("available")}</button>
          <button type="button" class="slot ${day.afternoonFull ? "full" : "open"}" ${day.afternoonFull ? "disabled" : ""} data-slot="${escapeHtml(afternoonLabel)}">${t("afternoon")} · ${day.afternoonFull ? t("full") : t("available")}</button>
        </div>`;
      }).join("");
      showRichModal(t("appointmentTitle"), `
        <p>${t("appointmentSub")}</p>
        <div class="schedule-grid">${rows}</div>
        <div class="schedule-note">${t("scheduleHours")}</div>
        <div class="slot-confirm" id="slotConfirm">
          <span><strong>${t("selectedSlot")}:</strong> <span id="selectedSlotLabel"></span></span>
          <button class="primary-btn" id="confirmAppointment">${t("confirmAppointment")}</button>

      `, mode === "student" ? "i-purple" : "i-green");

      `, "i-blue");

      function paintSuggestions(selectedIndex = 0) {
        const suggestions = suggestionSets[version];
        $("suggestionList").innerHTML = suggestions.map((s, i) => `<button type="button" class="suggestion-card ${i === selectedIndex ? "active" : ""}" data-suggestion="${i}">${escapeHtml(s)}</button>`).join("");
        $("finalMessageDraft").value = suggestions[selectedIndex];
        document.querySelectorAll("[data-suggestion]").forEach(btn => btn.addEventListener("click", () => {
          const index = Number(btn.dataset.suggestion);
          document.querySelectorAll("[data-suggestion]").forEach(item => item.classList.remove("active"));
          btn.classList.add("active");
          $("finalMessageDraft").value = suggestions[index];
        }));
      }

      paintSuggestions();
      $("refreshSuggestions").addEventListener("click", () => {
        supportiveSuggestionVersion += 1;
        version = supportiveSuggestionVersion % suggestionSets.length;
        paintSuggestions();
      });
      $("cancelSupportiveMessage").addEventListener("click", closeModal);
      $("sendSupportiveMessage").addEventListener("click", () => {
        closeModal();

    function historyChart() {
      if (!wellnessHistory.length) return `<p class="muted">${t("emptyHistory")}</p>`;
      const width = 680, left = 64, right = 620, top = 34, bottom = 205;
      const pts = wellnessHistory.map((r, i) => ({
        x: left + i * ((right - left) / Math.max(1, wellnessHistory.length - 1)),
        y: bottom - (r.score / 100) * (bottom - top),
        r
      }));
      const d = pts.map((p, i) => `${i ? "L" : "M"}${p.x},${p.y}`).join(" ");
      return `<svg class="history-chart" viewBox="0 0 ${width} 260">
        <line x1="${left}" y1="${top}" x2="${left}" y2="${bottom}" stroke="#dce8f5"/>
        <line x1="${left}" y1="${bottom}" x2="${right}" y2="${bottom}" stroke="#dce8f5"/>
        ${[0,25,50,75,100].map(v => {
          const y = bottom - (v / 100) * (bottom - top);
          return `<line x1="${left}" x2="${right}" y1="${y}" y2="${y}" stroke="#edf2f7"/><text x="24" y="${y+4}" fill="#68798d" font-size="12">${v}</text>`;
        }).join("")}
        <path d="${d}" fill="none" stroke="#3a9f6a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
        ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="6" fill="#3a9f6a"></circle>`).join("")}
        ${pts.map(p => `<text x="${p.x-28}" y="232" fill="#68798d" font-size="11">${p.r.date.slice(5,10)}</text>`).join("")}
        <text x="8" y="122" fill="#68798d" font-size="12" transform="rotate(-90 8 122)">${copy("Score", "评分")}</text>
        <text x="320" y="252" fill="#68798d" font-size="12">${copy("Date", "日期")}</text>
      </svg>`;
    }

    function historyList() {

    function bindStudentControls() {
      document.querySelectorAll("[data-mood]").forEach(btn => btn.addEventListener("click", () => { selectedMood = btn.dataset.mood; renderStudent(); }));
      ["stress","sleep","workload","social","activity"].forEach(id => {

        const value = $(id + "Value");
        if (range && value) range.addEventListener("input", () => value.textContent = range.value + "/10");
      });
      const submit = $("submitCheckin");
      if (submit) submit.addEventListener("click", submitCheckin);
      document.querySelectorAll("[data-consent-key]").forEach(input => input.addEventListener("change", () => {
        consentHistory.push({ date: now(), key: input.dataset.consentKey, state: input.checked ? "enabled" : "disabled" });
        $("consentLog").innerHTML = renderConsentLog();
      }));
      const save = $("savePrefs");
      if (save) save.addEventListener("click", () => { consentHistory.push({ date: now(), key:"supportPreferences", state:"savedState" }); showToast(t("toastSaved")); renderStudent(); activeTab = "privacy"; });
      document.querySelectorAll("[data-student-action]").forEach(btn => btn.addEventListener("click", () => {
        const index = Number(btn.dataset.studentAction);
        if (index === 0) showChat("student");
        else if (index === 2) showScheduleModal("student");
        else showModal(t("studentActionTitles")[index], t("studentActionBodies")[index], "i-blue");
      }));
    }

    function submitCheckin() {
      const focus = Number($("stressRange").value);
      const energy = Number($("sleepRange").value);
      const control = Number($("workloadRange").value);
      const belonging = Number($("socialRange").value);
      const recovery = Number($("activityRange").value);
      const moodScore = Number((selectedMood.match(/\((\d+)\)/) || [0,30])[1]);
      const score = Math.round((focus + energy + control + belonging + recovery) / 5 * 5 + moodScore / 2);
      wellnessHistory.push({ date: now(), score, mood: selectedMood, stress: focus, sleep: energy, workload: control, social: belonging, activity: recovery, note: $("stateNote")?.value.trim() || "" });
      showToast(t("toastSubmitted"));
      renderStudent();
    }

    function renderCounselor() {
      const body = activeTab === "alerts" ? counselorAlerts() : activeTab === "case" ? counselorCaseReview() : counselorJourney();
      $("content").innerHTML = `${body}${privacyGuarantee()}`;
      document.querySelectorAll("[data-case]").forEach(row => row.addEventListener("click", () => { selectedCase = Number(row.dataset.case); renderAll(); }));
      document.querySelectorAll("[data-review-card]").forEach(card => card.addEventListener("click", () => reviewMetricDetail(card.dataset.reviewCard)));
      document.querySelectorAll("[data-counselor-action]").forEach(btn => btn.addEventListener("click", () => handleCounselorAction(Number(btn.dataset.counselorAction))));
      document.querySelectorAll("[data-ai-feedback]").forEach(btn => btn.addEventListener("click", () => {
        document.querySelectorAll("[data-ai-feedback]").forEach(item => item.classList.remove("active"));
        btn.classList.add("active");

        showToast(`${label}: ${t("feedbackSaved")}`);
      }));
      document.querySelectorAll("[data-counselor-chat]").forEach(btn => btn.addEventListener("click", () => showChat("counselor")));

      if (filter) filter.addEventListener("change", () => renderRiskTable(filter.value));

          <div class="budget-row">${budget.map(b => `<div><div class="budget-line"><span>${b[0]} <strong>(${b[2]})</strong></span><strong>USD ${b[1].toLocaleString()}</strong></div><div class="bar-track"><div class="bar-fill" style="width:${parseFloat(b[2])}%"></div></div></div>`).join("")}</div>
        </div>
        <div class="grid three">${risks.map((r,i) => `<div class="card tint-${["blue","amber","green"][i]}"><div class="section-title"><span class="title-icon ${["i-blue","i-amber","i-green"][i]}">!</span><h3>${r[0]}</h3></div><p class="page-kicker" style="margin-top:10px;">${r[1]}</p></div>`).join("")}</div>
      </div>`;
    }

    function loginAs(key) {
      currentKey = key || "logan";
      current = accounts[key] || accounts.logan;
      if (current.role === "student") {
        wellnessHistory = studentWellnessHistories[currentKey];
        consentHistory = studentConsentHistories[currentKey];
      }
      activeTab = navKeys[current.role][0];
      $("loginUser").value = current.user;
      $("loginPass").value = current.pass;
      $("loginError").classList.remove("show");
      document.body.classList.remove("locked");
      renderAll();
    }

    function doLogin() {
      const user = $("loginUser").value.trim().toLowerCase();
      const pass = $("loginPass").value.trim();
      let key = null;
      if (user === "2330024099" && pass === "123456") key = "logan";
      if (user === "2330024121" && pass === "123456") key = "liam";
      if (user === "counselor001" && pass === "654321") key = "counselor";
      if ((user === "amin001" || user === "admin001") && pass === "666666") key = "admin";
      if (key) loginAs(key); else $("loginError").classList.add("show");
    }

    function setLanguage(nextLang) {
      lang = nextLang;
      renderAll();
    }

    $("loginBtn").addEventListener("click", doLogin);
    $("loginUser").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    $("loginPass").addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    if ($("logoutBtn")) $("logoutBtn").addEventListener("click", () => document.body.classList.add("locked"));
    $("loginLang").addEventListener("change", e => setLanguage(e.target.value));
    $("systemLang").addEventListener("change", e => setLanguage(e.target.value));
    $("modalClose").addEventListener("click", closeModal);
    $("actionModal").addEventListener("click", e => { if (e.target.id === "actionModal") closeModal(); });
    $("chatClose").addEventListener("click", closeChat);
    $("chatSend").addEventListener("click", () => {
      const value = $("chatInput").value.trim();
      if (!value) return;
      const div = document.createElement("div");
      div.className = "chat-bubble student";
      div.textContent = value;
      $("chatThread").appendChild(div);
      $("chatInput").value = "";
      $("chatThread").scrollTop = $("chatThread").scrollHeight;
    });
    $("chatInput").addEventListener("keydown", e => { if (e.key === "Enter") $("chatSend").click(); });

    const params = new URLSearchParams(location.search);
    if (["en","zh","ko","ja"].includes(params.get("lang"))) lang = params.get("lang");
    const hash = location.hash.replace("#", "");
    if (["student","counselor","admin"].includes(hash)) {
      const key = hash === "student" ? "logan" : hash;
      currentKey = key;
      current = accounts[key];
      if (current.role === "student") {
        wellnessHistory = studentWellnessHistories[currentKey];
        consentHistory = studentConsentHistories[currentKey];
      }
      activeTab = navKeys[current.role][0];
      document.body.classList.remove("locked");
    }
    renderAll();
  </script>
</body>
</html>
